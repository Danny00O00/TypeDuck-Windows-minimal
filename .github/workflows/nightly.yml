name: Nightly

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-main
  cancel-in-progress: true

env:
  PROTOBUF_VERSION: "33.5"

jobs:
  build-nightly:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout TypeDuck-Windows
        uses: actions/checkout@v4
        with:
          path: TypeDuck-Windows
          submodules: recursive
          fetch-depth: 0

      - name: Checkout TypeDuck-Windows-backend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/TypeDuck-Windows-backend
          path: TypeDuck-Windows-backend
          submodules: recursive
          fetch-depth: 0

      - name: Download TypeDuck schema build
        run: |
          $schemaDir = Join-Path $env:GITHUB_WORKSPACE "TypeDuck-HK-schema"
          $schemaZip = Join-Path $env:RUNNER_TEMP "TypeDuck-Windows.zip"

          if (Test-Path -LiteralPath $schemaDir) {
            Remove-Item -LiteralPath $schemaDir -Recurse -Force
          }

          Invoke-WebRequest `
            -Uri "https://github.com/TypeDuck-HK/schema/releases/download/latest/TypeDuck-Windows.zip" `
            -OutFile $schemaZip
          Expand-Archive -Path $schemaZip -DestinationPath $schemaDir -Force

      - name: Apply TypeDuck submodule patches
        working-directory: ${{ github.workspace }}/TypeDuck-Windows
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\Apply-TypeDuckSubmodulePatches.ps1 -RepoRoot .

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.6"
          cache-dependency-path: TypeDuck-Windows-backend/go.sum

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Download protoc
        run: |
          $protocRoot = Join-Path $env:RUNNER_TEMP "protoc-$env:PROTOBUF_VERSION-win64"
          $zipPath = Join-Path $env:RUNNER_TEMP "protoc-$env:PROTOBUF_VERSION-win64.zip"

          if (Test-Path -LiteralPath $protocRoot) {
            Remove-Item -LiteralPath $protocRoot -Recurse -Force
          }

          Invoke-WebRequest `
            -Uri "https://github.com/protocolbuffers/protobuf/releases/download/v$env:PROTOBUF_VERSION/protoc-$env:PROTOBUF_VERSION-win64.zip" `
            -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $protocRoot -Force

          "PROTOBUF_ROOT=$protocRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build nightly installer
        working-directory: ${{ github.workspace }}/TypeDuck-Windows
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\_all_in_package.ps1 `
            -RepoRoot "$env:GITHUB_WORKSPACE\TypeDuck-Windows" `
            -MoqiImeRoot "$env:GITHUB_WORKSPACE\TypeDuck-Windows-backend" `
            -RimeDataSource "$env:GITHUB_WORKSPACE\TypeDuck-HK-schema" `
            -ProtobufRoot "$env:PROTOBUF_ROOT"

      - name: Run TypeDuck PowerShell guards
        working-directory: ${{ github.workspace }}/TypeDuck-Windows
        run: |
          $repoRoot = Join-Path $env:GITHUB_WORKSPACE "TypeDuck-Windows"
          $backendRoot = Join-Path $env:GITHUB_WORKSPACE "TypeDuck-Windows-backend"

          # Static source/contract guards only (no GUI, no installed IME, no staged runtime).
          # Test-TypeDuckCandidateData.ps1 runs WITHOUT -Strict on purpose: its strict mode
          # demands a Debug-configuration test binary while CI builds Release. The GoogleTest
          # step below executes that suite directly instead.
          $guards = @(
            @{ Name = "Test-TypeDuckProtocolContract.ps1";    Arguments = @("-RepoRoot", $repoRoot, "-Strict") },
            @{ Name = "Test-TypeDuckCandidateData.ps1";       Arguments = @("-RepoRoot", $repoRoot) },
            @{ Name = "Test-TypeDuckCandidateWindow.ps1";     Arguments = @("-RepoRoot", $repoRoot, "-Strict") },
            @{ Name = "Test-TypeDuckSettingsAboutUi.ps1";     Arguments = @("-RepoRoot", $repoRoot, "-BackendRoot", $backendRoot, "-Strict") },
            @{ Name = "Test-TypeDuckSettingsPersistence.ps1"; Arguments = @("-RepoRoot", $repoRoot, "-BackendRoot", $backendRoot, "-Strict") }
          )

          $failed = @()
          foreach ($guard in $guards) {
            $guardPath = Join-Path $repoRoot "scripts\$($guard.Name)"
            $guardArgs = $guard.Arguments
            Write-Host "== $($guard.Name) $($guardArgs -join ' ')"
            pwsh -NoProfile -ExecutionPolicy Bypass -File $guardPath @guardArgs
            if ($LASTEXITCODE -ne 0) {
              $failed += $guard.Name
            }
          }

          if ($failed.Count -gt 0) {
            throw "TypeDuck PowerShell guards failed: $($failed -join ', ')"
          }

      - name: Run GoogleTest suites
        working-directory: ${{ github.workspace }}/TypeDuck-Windows
        run: |
          $buildDir = Join-Path $env:GITHUB_WORKSPACE "TypeDuck-Windows\build-vs32"
          if (-not (Test-Path -LiteralPath $buildDir -PathType Container)) {
            throw "CMake build directory not found: $buildDir"
          }

          # scripts/build.ps1 configures build-vs32 (Win32) and builds the whole solution in
          # Release, so every Tests/ target is already part of ALL_BUILD and no extra build is
          # needed.
          #
          # ctest is deliberately NOT used here. The top-level CMakeLists.txt never calls
          # enable_testing() -- only libIME2/CMakeLists.txt does, and that is a child directory
          # scope, so CMAKE_TESTING_ENABLED never reaches the root or the sibling Tests/ dirs.
          # CMake therefore emits no CTestTestfile.cmake at the build root, and
          # `ctest --test-dir build-vs32` prints "No tests were found!!!" and exits 0 -- a green
          # step that runs zero tests. Running the binaries directly is the only way to actually
          # execute these suites; they return non-zero on failure exactly like ctest would.
          #
          # To switch to ctest, add enable_testing() to the top-level CMakeLists.txt (before the
          # add_subdirectory(Tests/...) calls); this step can then become
          #   ctest --test-dir build-vs32 -C Release --output-on-failure --no-tests=error
          $testTargets = @(
            "TypeDuckCandidateInfo_test",
            "ProtoFraming_test",
            "ProtocolRecovery_test",
            "TypeDuckPreferences_test"
          )

          $failed = @()
          foreach ($target in $testTargets) {
            $exe = Get-ChildItem -LiteralPath $buildDir -Recurse -File -Filter "$target.exe" |
              Select-Object -First 1
            if (-not $exe) {
              throw "Test binary not found: $target.exe under $buildDir"
            }
            Write-Host "== $($exe.FullName)"
            & $exe.FullName
            if ($LASTEXITCODE -ne 0) {
              $failed += $target
            }
          }

          if ($failed.Count -gt 0) {
            throw "GoogleTest suites failed: $($failed -join ', ')"
          }

      - name: Run backend Go tests
        working-directory: ${{ github.workspace }}/TypeDuck-Windows-backend
        run: |
          # Every backend package EXCEPT input_methods/rime is green and runs unfiltered.
          # The list is derived from `go list` instead of being hard-coded, so a new backend
          # package gets tested automatically rather than silently skipped.
          $allPackages = go list ./...
          if ($LASTEXITCODE -ne 0) {
            throw "go list ./... failed."
          }
          $packages = @($allPackages | Where-Object { $_ -notmatch '/input_methods/rime$' })
          if ($packages.Count -eq 0) {
            throw "go list ./... returned no packages."
          }
          go test $packages
          if ($LASTEXITCODE -ne 0) {
            throw "Backend go test failed."
          }

          # input_methods/rime is the one package we cannot run in full, because a large part
          # of it is ALREADY RED UPSTREAM -- before, and independently of, the TypeDuck
          # Shift/asciiMode feature. Those tests need a populated rime runtime or the original
          # developer's machine, for example:
          #   * TestHandleRequestSyncsAppearanceAcrossInstances and
          #     TestLoadAppearancePrefsKeepsPresetThemeAfterPersist expect a theme named
          #     "purple"; only 2 themes are loaded in CI and that is not one of them.
          #   * TestAppearanceSettingsPersistToDisk expects appearance_config.json in a
          #     directory that the code under test never creates.
          #   * TestDownloadSchemeSetCommandInstallsSelectsAndRedeploys wants to download a
          #     scheme set, and the custom-phrase overlay tests need on-disk phrase data.
          #   * wubi_debug_test.go and z_probe_sentence_candidates_test.go are hard-coded to
          #     the original developer's own drive paths.
          # Upstream never ran `go test` in CI, which is why none of this was noticed. Those
          # tests are not ours and we do not claim them as green. We equally refuse to let
          # them mask a regression in the code we DO own, so rather than skipping the package
          # we run our own tests out of it by exact name. Keep this list in sync with
          # input_methods/rime/rime_test.go.
          $featureTests = @(
            'TestBareShiftDownPassesThroughAndIsNotForwardedToRime'
            'TestLoneLeftShiftTogglesAsciiMode'
            'TestLoneRightShiftTogglesAsciiMode'
            'TestShiftWithLetterDoesNotToggle'
            'TestCtrlShiftDoesNotToggle'
            'TestShiftAutoRepeatTogglesOnce'
            'TestShiftToggleWithCompositionCommitsRawInput'
            'TestShiftToggleBackToChineseAllowsComposing'
            'TestShiftToggleResponseCarriesSettingsUpdateOnlyOnToggle'
            'TestShiftTogglePropagatesAcrossInstances'
            'TestShiftTogglePublishesAsciiModeWithoutSchemaSaveOptions'
            'TestShiftToggleDoesNotLogTypedContent'
            'TestSettingsUpdateAsciiModeAppliesWithoutRedeploy'
            'TestSettingsUpdateAsciiModePropagatesToExistingInstance'
            'TestNewSessionInheritsAsciiMode'
            'TestAsciiModeSurvivesRedeployAndSchemaSwitch'
            'TestCapsLockStillForwardedToRime'
            'TestOnCommandAsciiToggleAttachesSettingsUpdate'
            'TestOnCommandModeIconTogglePersistsWithoutExistingSession'
            'TestProcessKeySyncsSharedInputStateAfterShiftAndCapsToggle'
          )
          # Fully anchored alternation: it cannot partially match an upstream test name.
          $runPattern = '^(' + ($featureTests -join '|') + ')$'

          # A -run pattern that matches nothing still exits 0, so a typo or a renamed test
          # would quietly turn this guard into a no-op that tests nothing. Assert the
          # selection before trusting the result.
          $selected = @(go test -list $runPattern ./input_methods/rime | Where-Object { $_ -match '^Test' })
          if ($LASTEXITCODE -ne 0) {
            throw "go test -list failed for input_methods/rime."
          }
          $missing = @($featureTests | Where-Object { $selected -notcontains $_ })
          if ($missing.Count -gt 0) {
            throw "Stale TypeDuck feature-test list: $($missing -join ', ') no longer exist in input_methods/rime."
          }
          if ($selected.Count -ne $featureTests.Count) {
            throw "Expected $($featureTests.Count) TypeDuck feature tests in input_methods/rime, -run selected $($selected.Count)."
          }
          Write-Host "Running $($selected.Count) TypeDuck Shift/asciiMode tests from input_methods/rime."

          go test -run $runPattern -v ./input_methods/rime
          if ($LASTEXITCODE -ne 0) {
            throw "Backend go test failed (TypeDuck Shift/asciiMode feature tests)."
          }

      - name: Prepare installer asset name
        working-directory: ${{ github.workspace }}/TypeDuck-Windows
        run: |
          $assetName = "typeduck-windows-ime-setup-${{ github.event.release.tag_name || github.sha }}.exe"
          $sourceAsset = Join-Path $PWD "installer\dist\typeduck-windows-ime-setup.exe"
          $assetPath = Join-Path $PWD ("installer\dist\" + $assetName)
          if (-not (Test-Path -LiteralPath $sourceAsset -PathType Leaf)) {
            throw "Missing installer asset: $sourceAsset"
          }
          Copy-Item -LiteralPath $sourceAsset -Destination $assetPath -Force
          "TYPEDUCK_INSTALLER_ASSET=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: typeduck-windows-ime-nightly-${{ github.sha }}
          path: ${{ github.workspace }}/TypeDuck-Windows/installer/dist/${{ env.TYPEDUCK_INSTALLER_ASSET }}
          if-no-files-found: error

      - name: Publish nightly release
        working-directory: ${{ github.workspace }}/TypeDuck-Windows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "nightly"
          $assetPath = Join-Path $PWD ("installer\dist\" + $env:TYPEDUCK_INSTALLER_ASSET)
          $notesPath = Join-Path $env:RUNNER_TEMP "nightly-notes.md"
          $runUrl = "https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"

          @(
            "Automated nightly build from `main`."
            ""
            "Commit: $env:GITHUB_SHA"
            "Run: $runUrl"
          ) | Set-Content -LiteralPath $notesPath -Encoding utf8

          git tag --force $tag $env:GITHUB_SHA
          git push origin "refs/tags/$tag" --force

          $releaseListJson = gh release list --limit 100 --json tagName
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to query existing releases."
          }
          $releaseList = $releaseListJson | ConvertFrom-Json
          $existingTag = $releaseList | Where-Object { $_.tagName -eq $tag } | Select-Object -ExpandProperty tagName -First 1

          if (-not [string]::IsNullOrWhiteSpace($existingTag)) {
            gh release upload $tag $assetPath --clobber
            gh release edit $tag --title "Nightly" --notes-file $notesPath
          }
          else {
            gh release create $tag $assetPath --title "Nightly" --notes-file $notesPath --prerelease
          }
